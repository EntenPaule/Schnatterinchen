# =================== CLP-320 Lube (mit MINUTES) ===================

[gcode_macro LUBE320]
description: "Verteilt CLP320: XY-Schlange + sanftes Z, Dauer via MINUTES oder CYCLES"
gcode:
  # --------- Parameter / Defaults ---------
  {% set minutes    = params.MINUTES|default(None) %}
  {% set cycles_in  = params.CYCLES|default(3)|int %}
  {% set v_xy       = params.XY_SPEED|default(200)|float %}
  {% set v_z        = params.Z_SPEED|default(20)|float %}
  {% set accel      = params.XY_ACCEL|default(1500)|float %}
  {% set margin     = params.MARGIN|default(5)|float %}
  {% set zsafe      = params.Z|default(5)|float %}
  {% set stripes_in = params.STRIPES|default(12)|int %}
  {% set stripes    = stripes_in if stripes_in > 1 else 2 %}
  {% set zlift      = params.ZLIFT|default(1.5)|float %}
  {% set zevery_in  = params.Z_EVERY|default(2)|int %}
  {% set zevery     = zevery_in if zevery_in >= 1 else 1 %}
  {% set jitter_x   = params.JITTER_X|default(0)|float %}
  {% set jitter_y   = params.JITTER_Y|default(0)|float %}
  {% set diagonals  = params.DIAGONALS|default(0)|int %}

  # --------- Limits aus Config ---------
  {% set xmin = (printer.configfile.settings.stepper_x.position_min|default(0))|float %}
  {% set xmax = (printer.configfile.settings.stepper_x.position_max)|float %}
  {% set ymin = (printer.configfile.settings.stepper_y.position_min|default(0))|float %}
  {% set ymax = (printer.configfile.settings.stepper_y.position_max)|float %}
  {% set zmin = (printer.configfile.settings.stepper_z.position_min|default(0))|float %}
  {% set zmax = (printer.configfile.settings.stepper_z.position_max)|float %}

  # --------- Arbeitsfenster + Checks ---------
  {% set x0 = xmin + margin %}
  {% set x1 = xmax - margin %}
  {% set y0 = ymin + margin %}
  {% set y1 = ymax - margin %}
  {% if x1 <= x0 or y1 <= y0 %}
    {action_raise_error("LUBE: Arbeitsbereich ungueltig (Limits/MARGIN)")}
  {% endif %}

  # --------- Z-Ziele begrenzen ---------
  {% set z_go_pre = zsafe if zsafe > zmin else zmin %}
  {% set z_go     = (zmax - margin) if z_go_pre > (zmax - margin) else z_go_pre %}
  {% set z_up_pre = z_go + zlift %}
  {% set z_up     = (zmax - margin) if z_up_pre > (zmax - margin) else z_up_pre %}
  {% set z_dn_pre = z_go - zlift %}
  {% set z_dn_min = zmin + margin %}
  {% set z_dn     = z_dn_min if z_dn_pre < z_dn_min else z_dn_pre %}

  # --------- Geometrie / Zeitabschaetzung ---------
  {% set xlen = x1 - x0 %}
  {% set ylen = y1 - y0 %}
  {% set step_y = ylen / (stripes - 1) %}
  {% set stripe_time = (xlen / v_xy) + (step_y / (v_xy*0.5)) %}
  {% set z_time = (zlift / v_z) * 2 %}
  {% set stripe_time_eff = stripe_time + (z_time / zevery) %}
  {% set cycle_time = stripe_time_eff * stripes %}
  {% if minutes is not none %}
    {% set cycles_calc = (((minutes|int)*60) / cycle_time)|int %}
    {% set cycles = cycles_calc if cycles_calc >= 1 else 1 %}
  {% else %}
    {% set cycles = cycles_in if cycles_in >= 1 else 1 %}
  {% endif %}

  # --------- Homen bei Bedarf ---------
  {% set homed = printer.toolhead.homed_axes|default("") %}
  {% if "x" not in homed or "y" not in homed or "z" not in homed %}
    G28
  {% endif %}

  SAVE_GCODE_STATE NAME=LUBE320RUN_STATE
  M118 LUBE_START XY={v_xy} Z={v_z} stripes={stripes} cycles={cycles}

  # --------- Setup & Start ---------
  G90
  SET_VELOCITY_LIMIT VELOCITY={v_xy} ACCEL={accel}
  G1 Z{z_go} F{v_z*60}
  G1 X{x0} Y{y0} F{v_xy*60}

  # --------- Haupt-Loop ---------
  {% for c in range(cycles) %}
    {% for i in range(stripes) %}
      {% set y_base = y0 + i*step_y %}
      {% set r = (((i*37) % 101) / 100.0)*2 - 1 %}
      {% set y_j = y_base + r*jitter_y %}
      {% set y = y0 if y_j < y0 else (y1 if y_j > y1 else y_j) %}

      {% if i % 2 == 0 %}
        {% set x_raw = x1 + r*jitter_x %}
        {% set x_target = x0 if x_raw < x0 else (x1 if x_raw > x1 else x_raw) %}
        G1 X{x_target} Y{y} F{v_xy*60}
      {% else %}
        {% set x_raw = x0 + r*jitter_x %}
        {% set x_target = x0 if x_raw < x0 else (x1 if x_raw > x1 else x_raw) %}
        G1 X{x_target} Y{y} F{v_xy*60}
      {% endif %}

      {% if (i+1) % zevery == 0 %}
        G1 Z{z_up} F{v_z*60}
        G1 Z{z_dn} F{v_z*60}
        G1 Z{z_go} F{v_z*60}
      {% endif %}
    {% endfor %}
    G1 X{x0} Y{y0} F{v_xy*60}
  {% endfor %}

  # --------- Optionale Diagonalen ---------
  {% if diagonals == 1 %}
    G1 X{x1} Y{y1} F{v_xy*60}
    G1 X{x0} Y{y1} F{v_xy*60}
    G1 X{x1} Y{y0} F{v_xy*60}
    G1 X{x0} Y{y0} F{v_xy*60}
  {% endif %}

  RESTORE_GCODE_STATE NAME=LUBE320RUN_STATE
  M118 LUBE_DONE
