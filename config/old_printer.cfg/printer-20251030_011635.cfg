# VORON2 250mm Schnatti Config

#The procedure for updating MCU firmware using the SD Card is similar to that of other methods. 
#Instead of using make flash it is necessary to run a helper script, flash-sdcard.sh. 
#Updating a BigTreeTech SKR 1.3 might look like the following:
#
#
# slash script update MCU.sh  have fun 
#
#                     ~/klipper_config/script/updatemcu.sh
#
# aber hier wenn .sh nicht geht manuell 
#
# ls /dev/serial/by-id/*
#
# sudo service klipper stop
# cd ~/klipper
# git pull
# make clean
# make menuconfig
# make
# ./scripts/flash-sdcard.sh /dev/serial/by-id/usb-Klipper_lpc1768_02F0000F271835AECA683E53811E00F5-if00 btt-skr-v1.3
# ./scripts/flash-sdcard.sh /dev/serial/by-id/usb-Klipper_lpc1768_13FC0F0F93235253B409F34C020000F5-if00 btt-skr-v1.3
# sudo service klipper start

#################################################
#################################################
              ###   MCU   ##
#################################################
#################################################

[mcu]
# Mcu for X/Y/E steppers
serial: /dev/serial/by-id/usb-Klipper_lpc1768_02F0000F271835AECA683E53811E00F5-if00
#   Obtain definition by "ls -l /dev/serial/by-id/"


[mcu z]
# Mcu for Z steppers
serial: /dev/serial/by-id/usb-Klipper_lpc1768_13FC0F0F93235253B409F34C020000F5-if00

#################################################
#################################################
              ###   PRINTER   ##
#################################################
#################################################
[printer]
kinematics: corexy
max_velocity: 400
max_accel: 4000
max_z_velocity: 50
max_z_accel: 350

[idle_timeout]
timeout: 3600
gcode:
 TURN_OFF_HEATERS
 _DISPLAY_OFF
 M84
 SET_PIN PIN=caselight VALUE=0
 SET_FAN_SPEED FAN=Nevermore SPEED=0

[exclude_object]

#################################################
#################################################
              ###   PROBE   ##
#################################################
#################################################

[probe]
pin: z:P1.24
y_offset: 25.0
lift_speed: 20
x_offset: 3
z_offset: 0
speed: 10.0
samples: 3
samples_result: median
sample_retract_dist: 3.0
samples_tolerance: 0.006
samples_tolerance_retries: 3

[filament_switch_sensor e0_sensor]
switch_pin: !P1.25

#################################################
#################################################
              ###   QUAD GANTRY  ##
#################################################
#################################################

[quad_gantry_level]
gantry_corners:
    -60, -10
    310, 320
points:
    50, 25
    50, 175
    200, 175
    200, 25
speed: 100
horizontal_move_z: 10
retries: 5
retry_tolerance: 0.007
max_adjust: 10

#################################################
#################################################
              ###   BED MESH   ##
#################################################
#################################################

[bed_mesh]
speed: 300
horizontal_move_z: 10
mesh_min: 25, 25
mesh_max: 240,240
zero_reference_position: 180,240
fade_start: 0.6
fade_end: 10.0
probe_count: 5,5
algorithm: bicubic
adaptive_margin: 5

#################################################
#################################################
              ###   Temp RPI   ##
#################################################
#################################################

[temperature_sensor raspberry_pi]
sensor_type: temperature_host
min_temp: 10
max_temp: 80

[virtual_sdcard]
path: /home/ente/printer_data/gcodes

[display_status]

#################################################
#################################################
              ###   Include Zeug   ##
#################################################
#################################################

#[include mainsail.cfg]
[include heaters.cfg]
[include motors.cfg]
[include macros.cfg]
#[include adxl.cfg]
[include fanetc.cfg]
[include pause.cfg]
[include lcd.cfg]
[include lcd_menu.cfg]
[include lcd_temp.cfg]
[include klicky/klicky-probe.cfg]
[include variable.cfg]
[include clp320loop.cfg]
#[include AdaptiveMeshWithFuzz.cfg]

